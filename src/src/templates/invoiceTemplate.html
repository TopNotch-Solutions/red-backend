<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; padding: 0; }
        .container { width: 100%; max-width: 800px; margin: auto; border: 1px solid #ddd; padding: 20px; }
        h1 { text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #f4f4f4; }
        .total { font-weight: bold; text-align: right; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Invoice #{{taxInvoiceNo}}</h1>
        <p><strong>Account Holder:</strong> {{accountHolder}}</p>
        <p><strong>Account No:</strong> {{accountNo}}</p>
        <p><strong>Date:</strong> {{date}}</p>
        <p><strong>VAT No:</strong> {{vatNo}}</p>

        <table>
            <tr>
                <th>Date</th>
                <th>Description</th>
                <th>Tariff (N$)</th>
                <th>VAT %</th>
                <th>VAT Charge (N$)</th>
                <th>Amount (VAT excl.)</th>
                <th>Amount (N$)</th>
            </tr>
            {{charges}}
        </table>

        <p class="total">Total: N$ {{total}}</p>
    </div>
</body>
</html>
